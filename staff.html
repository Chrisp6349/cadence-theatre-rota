<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cadence — Staff Profiles</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@600;700;800&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/cadence.css">
<style>
  .sp-picker{display:flex;align-items:center;gap:10px;margin-bottom:24px;flex-wrap:wrap;}
  .sp-picker select{font-family:var(--font-body);font-size:13.5px;padding:9px 12px;border-radius:var(--r-sm);
    border:1px solid var(--ink-150);background:var(--surface);color:var(--ink-900);min-width:240px;}
  .empty-note{color:var(--ink-500);font-size:13.5px;padding:20px 0;}

  .sp-head{display:flex;align-items:center;gap:14px;margin-bottom:20px;}
  .sp-avatar{width:48px;height:48px;border-radius:50%;background:var(--teal-100);color:var(--teal-700);
    display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-weight:800;font-size:16px;flex-shrink:0;}
  .sp-name{font-family:var(--font-display);font-weight:800;font-size:20px;}
  .sp-role{font-family:var(--font-mono);font-size:11px;color:var(--ink-500);text-transform:uppercase;letter-spacing:.05em;}

  .sp-stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:16px;margin-bottom:24px;}

  .sp-section-title{font-family:var(--font-mono);font-size:10.5px;color:var(--ink-500);text-transform:uppercase;
    letter-spacing:.05em;margin:24px 0 10px;}
  .sp-pattern{display:grid;grid-template-columns:repeat(auto-fit,minmax(90px,1fr));gap:10px;}
  .sp-pattern-day{background:var(--surface);border:1px solid var(--ink-150);border-radius:var(--r-sm);
    padding:10px;text-align:center;}
  .sp-pattern-day .d-label{font-family:var(--font-mono);font-size:10px;color:var(--ink-500);text-transform:uppercase;}
  .sp-pattern-day .d-count{font-family:var(--font-display);font-weight:800;font-size:20px;margin-top:4px;}
  .sp-pattern-day.zero{opacity:.35;}

  .sp-badges{display:flex;flex-wrap:wrap;gap:8px;}
  .sp-badge{background:var(--teal-100);color:var(--teal-700);font-size:12px;font-weight:600;
    padding:6px 12px;border-radius:var(--r-pill);}
</style>
</head>
<body>
<div id="shellRoot"></div>

<script type="module">
  import { requireSession } from "./js/auth.js";
  import { renderShell } from "./js/shell.js";
  import { getDepartment, listTheatres, listStaff } from "./js/department.js";
  import { mondayOfCurrentWeek } from "./js/rota.js";
  import { loadEligibleEntries, classify, buildSessionGroups } from "./js/insights.js";
  import { applyTheme } from "./js/theme.js";
  applyTheme();

  const { user, profile } = await requireSession();
  const dept = await getDepartment(profile.departmentId);
  profile.departmentName = dept?.name || "Department";

  const content = renderShell({ profile, activePage: "staff", title: "Staff Profiles" });

  const theatres = await listTheatres(profile.departmentId);
  const staffList = await listStaff(profile.departmentId);

  function localIso(d) {
    const y = d.getFullYear(), m = String(d.getMonth() + 1).padStart(2, "0"), day = String(d.getDate()).padStart(2, "0");
    return `${y}-${m}-${day}`;
  }
  const todayIso = localIso(new Date());

  content.innerHTML = `
    <div class="sp-picker">
      <select id="staffSelect">
        <option value="">Select someone…</option>
        ${[...staffList].sort((a, b) => a.name.localeCompare(b.name)).map(s =>
          `<option value="${s.name}" data-type="${s.type}">${s.name}${s.type === "anaesthetist" ? " (Anaesthetist)" : ""}</option>`
        ).join("")}
      </select>
    </div>
    <div id="profileArea"><p class="empty-note">Pick a name above to see their history.</p></div>
  `;

  // Fetch and flatten the whole published history once — every profile
  // lookup after that is instant, no further Firestore reads.
  const { entries } = await loadEligibleEntries(profile.departmentId, theatres, mondayOfCurrentWeek(), todayIso);
  const sessionGroups = buildSessionGroups(entries, theatres);

  function initials(name) {
    return name.split(" ").map(s => s[0]).slice(0, 2).join("").toUpperCase();
  }

  function buildProfile(name, type) {
    const mySessions = sessionGroups.filter(g => g.odps.includes(name) || g.anaes === name);
    const theatreCounts = {};
    const dayCounts = {};
    const partnerCounts = {};

    mySessions.forEach(g => {
      theatreCounts[g.theatreName] = (theatreCounts[g.theatreName] || 0) + 1;
      dayCounts[g.day] = (dayCounts[g.day] || 0) + 1;
      if (g.anaes === name) {
        g.odps.forEach(odp => { partnerCounts[odp] = (partnerCounts[odp] || 0) + 1; });
      } else if (g.anaes) {
        partnerCounts[g.anaes] = (partnerCounts[g.anaes] || 0) + 1;
      }
    });

    let onCallCount = 0, supportCount = 0;
    entries.forEach(({ suffix, value }) => {
      if (value !== name) return;
      const c = classify(suffix, theatres);
      if (c?.kind === "oncall_odp" || c?.kind === "oncall_anaes") onCallCount++;
      else if (c?.kind === "support") supportCount++;
    });

    const favouriteTheatre = Object.entries(theatreCounts).sort((a, b) => b[1] - a[1])[0] || null;
    const topPartner = Object.entries(partnerCounts).sort((a, b) => b[1] - a[1])[0] || null;

    const badges = [];
    if (mySessions.length >= 20) badges.push("Regular — 20+ sessions");
    if (onCallCount >= 10) badges.push("On-call veteran — 10+ shifts");
    if (Object.keys(partnerCounts).length >= 5) badges.push("Team player — worked with 5+ colleagues");
    if (favouriteTheatre && favouriteTheatre[1] >= 10) badges.push(`${favouriteTheatre[0]} regular`);

    return { type, sessionsWorked: mySessions.length, theatreCounts, dayCounts, onCallCount, supportCount, favouriteTheatre, topPartner, badges };
  }

  function render(name, type) {
    const el = document.getElementById("profileArea");
    if (!name) {
      el.innerHTML = `<p class="empty-note">Pick a name above to see their history.</p>`;
      return;
    }
    const p = buildProfile(name, type);
    const ALL_DAYS = ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday", "Sunday"];

    if (p.sessionsWorked === 0 && p.onCallCount === 0 && p.supportCount === 0) {
      el.innerHTML = `
        <div class="sp-head">
          <div class="sp-avatar">${initials(name)}</div>
          <div><div class="sp-name">${name}</div><div class="sp-role">${type === "anaesthetist" ? "Anaesthetist" : "ODP"}</div></div>
        </div>
        <p class="empty-note">No published rota history for ${name} yet.</p>`;
      return;
    }

    const patternHtml = ALL_DAYS.map(d => {
      const count = p.dayCounts[d] || 0;
      return `<div class="sp-pattern-day${count === 0 ? " zero" : ""}">
        <div class="d-label">${d.slice(0, 3)}</div>
        <div class="d-count">${count}</div>
      </div>`;
    }).join("");

    el.innerHTML = `
      <div class="sp-head">
        <div class="sp-avatar">${initials(name)}</div>
        <div><div class="sp-name">${name}</div><div class="sp-role">${type === "anaesthetist" ? "Anaesthetist" : "ODP"}</div></div>
      </div>
      <div class="sp-stat-grid">
        <div class="card"><div class="card-label">Theatre sessions</div><div class="card-value">${p.sessionsWorked}</div></div>
        <div class="card"><div class="card-label">On call</div><div class="card-value">${p.onCallCount}</div></div>
        ${type === "odp" ? `<div class="card"><div class="card-label">Support duty</div><div class="card-value">${p.supportCount}</div></div>` : ""}
        <div class="card"><div class="card-label">Favourite theatre</div><div class="card-value" style="font-size:18px;">${p.favouriteTheatre ? p.favouriteTheatre[0] : "—"}</div></div>
      </div>

      <div class="sp-section-title">Work pattern by day</div>
      <div class="sp-pattern">${patternHtml}</div>

      <div class="sp-section-title">Most frequent colleague</div>
      <p style="font-size:13.5px;color:var(--ink-700);">${p.topPartner ? `${p.topPartner[0]} — worked together ${p.topPartner[1]} time${p.topPartner[1] === 1 ? "" : "s"}` : "Not enough data yet"}</p>

      ${p.badges.length ? `
        <div class="sp-section-title">Badges</div>
        <div class="sp-badges">${p.badges.map(b => `<span class="sp-badge">${b}</span>`).join("")}</div>
      ` : ""}
    `;
  }

  document.getElementById("staffSelect").addEventListener("change", (e) => {
    const opt = e.target.selectedOptions[0];
    render(e.target.value, opt?.dataset.type);
  });
</script>
</body>
</html>
