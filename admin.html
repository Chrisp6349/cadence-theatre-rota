<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cadence — Administration</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/cadence.css">
</head>
<body>
<div id="shellRoot"></div>

<script type="module">
  import { requireSession } from "./js/auth.js";
  import { renderShell } from "./js/shell.js";
  import { getDepartment } from "./js/department.js";

  const { profile } = await requireSession();
  const dept = await getDepartment(profile.departmentId);
  profile.departmentName = dept?.name || "Department";

  const content = renderShell({ profile, activePage: "admin", title: "Administration" });

  if (profile.role !== "admin") {
    content.innerHTML = `<p style="color:var(--ink-500);">This page is only available to admins.</p>`;
  } else {
    content.innerHTML = `
      <div class="card" style="max-width:480px;">
        <div class="card-label">Coming next</div>
        <p style="font-size:14px;color:var(--ink-700);line-height:1.6;margin-top:8px;">
          Theatres, staff, and list-option management from the browser — no more editing
          Firestore documents by hand. For now, add/edit theatres and staff directly in the
          Firestore console under <code>departments/${profile.departmentId}/theatres</code>
          and <code>.../staff</code>.
        </p>
      </div>
    `;
  }
</script>
</body>
</html>
