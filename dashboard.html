<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cadence — Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@600;700;800&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/cadence.css">
<style>
  .strip-label{font-family:var(--font-mono);font-size:10.5px;color:var(--ink-500);text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px;}
  .bh-banner{display:flex;align-items:center;gap:8px;background:var(--status-oncall-bg);color:var(--status-oncall);
    font-weight:600;font-size:12.5px;padding:8px 14px;border-radius:var(--r-sm);margin-bottom:16px;}
  .theatre-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:12px;margin-bottom:24px;}
  .theatre-card{background:var(--surface);border:1px solid var(--ink-150);border-radius:var(--r-md);padding:14px;}
  .tc-head{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
  .tc-head .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
  .tc-head .dot.available{background:var(--status-available);}
  .tc-head .dot.inlist{background:var(--status-inlist);animation:pulse-dot 1.8s infinite;}
  .tc-head .dot.closed{background:var(--status-closed);}
  .tc-name{font-weight:700;font-size:13.5px;flex:1;}
  .tc-list{font-family:var(--font-mono);font-size:10px;background:var(--ink-100);color:var(--ink-500);
    padding:2px 6px;border-radius:4px;flex-shrink:0;}
  .tc-row{font-size:12.5px;color:var(--ink-700);padding:2px 0;}
  .tc-empty{font-size:12.5px;color:var(--ink-300);font-style:italic;}
  .stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:8px;}
  .empty-note{color:var(--ink-500);font-size:13.5px;padding:20px 0;}

  .week-nav{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
  .week-nav button{background:var(--surface);border:1px solid var(--ink-150);border-radius:var(--r-sm);
    padding:7px 12px;font-family:var(--font-body);font-size:12.5px;font-weight:600;color:var(--ink-700);cursor:pointer;}
  .week-nav button:hover{background:var(--ink-100);}
  .week-nav-label{font-family:var(--font-mono);font-size:11px;color:var(--ink-500);flex:1;text-align:center;}
  .week-nav .this-week-btn{color:var(--teal-600);border-color:var(--teal-100);}

  .day-tabs{display:flex;gap:6px;overflow-x:auto;margin-bottom:18px;padding-bottom:2px;}
  .day-tab{flex-shrink:0;background:var(--surface);border:1px solid var(--ink-150);border-radius:var(--r-pill);
    padding:7px 14px;font-family:var(--font-body);font-size:12px;font-weight:600;color:var(--ink-700);
    cursor:pointer;white-space:nowrap;}
  .day-tab:hover{background:var(--ink-100);}
  .day-tab.active{background:var(--teal-600);color:#fff;border-color:var(--teal-600);}
  .day-tab.is-today:not(.active){border-color:var(--teal-500);color:var(--teal-700);}

  .myweek-card{margin-top:24px;}
  .myweek-select-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
  .myweek-select-row select{font-family:var(--font-body);font-size:13.5px;padding:9px 12px;border-radius:var(--r-sm);
    border:1px solid var(--ink-150);background:var(--surface);min-width:220px;}
  .myweek-hi{font-family:var(--font-display);font-weight:800;font-size:16px;}
  .myweek-change{background:none;border:none;color:var(--teal-600);font-size:12px;font-weight:600;cursor:pointer;
    text-decoration:underline;padding:0;}
  .myweek-days{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-top:14px;}
  .myweek-day{background:var(--canvas);border:1px solid var(--ink-150);border-radius:var(--r-sm);padding:10px;}
  .myweek-day.today{border-color:var(--teal-500);background:var(--teal-50);}
  .myweek-day .md-label{font-family:var(--font-mono);font-size:10px;color:var(--ink-500);text-transform:uppercase;margin-bottom:5px;}
  .myweek-day .md-role{font-size:12.5px;font-weight:600;color:var(--ink-900);}
  .myweek-day .md-off{font-size:12.5px;color:var(--ink-300);font-style:italic;}
</style>
</head>
<body>
<div id="shellRoot"></div>

<script type="module">
  import { requireSession } from "./js/auth.js";
  import { renderShell } from "./js/shell.js";
  import { getDepartment, listTheatres, listStaff } from "./js/department.js";
  import { loadWeek, mondayOfCurrentWeek } from "./js/rota.js";
  import { applyTheme } from "./js/theme.js";
  applyTheme();

  const { user, profile } = await requireSession();
  const dept = await getDepartment(profile.departmentId);
  profile.departmentName = dept?.name || "Department";

  const content = renderShell({ profile, activePage: "dashboard", title: "Dashboard" });

  const theatres = await listTheatres(profile.departmentId);
  const staffList = await listStaff(profile.departmentId);

  const ALL_DAYS = ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday", "Sunday"];
  // Formats a Date using its LOCAL year/month/day — never .toISOString(),
  // which converts to UTC first and silently shifts the date back by one
  // during British Summer Time (UTC+1). Every date-to-string conversion
  // on this page goes through this function.
  function localIso(d) {
    const y = d.getFullYear(), m = String(d.getMonth() + 1).padStart(2, "0"), day = String(d.getDate()).padStart(2, "0");
    return `${y}-${m}-${day}`;
  }
  const todayIso = localIso(new Date());
  const todayName = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"][new Date().getDay()];

  // ---- State: which week and which day within it is on screen -----------
  // If we arrived via a link from calendar.html (?week=<mondayIso>&day=<0-6>),
  // start there instead of the current week/today.
  const params = new URLSearchParams(window.location.search);
  const linkedWeek = params.get("week");
  const linkedDay = params.get("day");

  let weekOffset = 0;              // 0 = this week, +1 = next week, -1 = previous week, etc.
  let selectedDayIdx = ALL_DAYS.indexOf(todayName); // stays on the same weekday when you flip weeks
  let rota = {};

  if (linkedWeek) {
    const currentMonday = new Date(mondayOfCurrentWeek() + "T00:00:00");
    const linkedMonday = new Date(linkedWeek + "T00:00:00");
    weekOffset = Math.round((linkedMonday - currentMonday) / (7 * 86400000));
    if (linkedDay !== null && !isNaN(Number(linkedDay))) selectedDayIdx = Number(linkedDay);
  }

  function weekStartIso(offset) {
    const d = new Date(mondayOfCurrentWeek() + "T00:00:00");
    d.setDate(d.getDate() + offset * 7);
    return localIso(d);
  }
  function isoPlusDays(mondayIso, i) {
    const d = new Date(mondayIso + "T00:00:00");
    d.setDate(d.getDate() + i);
    return d;
  }
  function shortDate(d) {
    return d.toLocaleDateString("en-GB", { day: "numeric", month: "short" });
  }
  function longDate(d) {
    return d.toLocaleDateString("en-GB", { day: "numeric", month: "long", year: "numeric" });
  }

  async function loadRota() {
    const week = await loadWeek(profile.departmentId, weekStartIso(weekOffset));
    rota = week.data || {};
  }

  // ---- Theatre status (for the currently selected day) -------------------
  function theatreInfo(day, t) {
    const odp1 = rota[`${day}_${t.id}_odp1`] || "";
    const odp2 = rota[`${day}_${t.id}_odp2`] || "";
    const anaes = rota[`${day}_${t.id}_anaes`] || "";
    const listType = rota[`${day}_${t.id}_list`] || "";
    const hasList = !!(odp1 || odp2 || anaes);
    let status = "available";
    if (hasList) status = (listType.includes("MAINTENANCE") || listType.includes("NO LIST")) ? "closed" : "inlist";
    return { odp1, odp2, anaes, listType, status };
  }

  // ---- My Week -------------------------------------------------------------
  // Remembers the chosen name per department, on this device, in
  // localStorage — no Firestore write needed (viewers can't write their
  // own /users doc under the current rules), so this works for every role.
  const MYWEEK_KEY = `cadence_myweek_${profile.departmentId}`;

  // Turns "<theatreId>_odp1" / "_anaes" / "support1" / "oncall_odp" etc.
  // into a human label, or null if this key isn't a person-placement field
  // (list types, sessions, the from-home checkbox never match a name anyway).
  function describePlacement(suffix) {
    if (/_odp[12]$/.test(suffix)) {
      const theatreId = suffix.replace(/_odp[12]$/, "");
      const t = theatres.find(x => x.id === theatreId);
      return t ? `${t.name} · ODP` : null;
    }
    if (suffix.endsWith("_anaes")) {
      const theatreId = suffix.replace(/_anaes$/, "");
      if (theatreId === "oncall") return "On call · Anaesthetist";
      if (theatreId === "wl") return "Weekend waiting list · Anaesthetist";
      const t = theatres.find(x => x.id === theatreId);
      return t ? `${t.name} · Anaesthetist` : null;
    }
    if (/^support[123]$/.test(suffix)) return "Support";
    if (suffix === "oncall_odp") return "On call";
    if (suffix === "oncall_odp1" || suffix === "oncall_odp2") return "On call (weekend)";
    if (suffix === "wl_odp") return "Weekend waiting list";
    return null;
  }

  function placementsForDay(day, name) {
    const found = [];
    Object.entries(rota).forEach(([k, v]) => {
      if (v !== name || !k.startsWith(day + "_")) return;
      const label = describePlacement(k.slice(day.length + 1));
      if (label) found.push(label);
    });
    return found;
  }

  function renderMyWeekResult(name) {
    const dayCards = ALL_DAYS.map((day, i) => {
      const d = isoPlusDays(weekStartIso(weekOffset), i);
      const isDayToday = localIso(d) === todayIso;
      const placements = placementsForDay(day, name);
      const body = placements.length
        ? placements.map(p => `<div class="md-role">${p}</div>`).join("")
        : `<div class="md-off">Not rostered</div>`;
      return `<div class="myweek-day${isDayToday ? " today" : ""}">
        <div class="md-label">${day.slice(0, 3)} ${shortDate(d)}</div>
        ${body}
      </div>`;
    }).join("");

    document.getElementById("myweekCard").innerHTML = `
      <div class="myweek-select-row">
        <span class="myweek-hi">${name}</span>
        <button class="myweek-change" id="myweekChangeBtn">Not you? Switch name</button>
      </div>
      <div class="myweek-days">${dayCards}</div>
    `;
    document.getElementById("myweekChangeBtn").addEventListener("click", () => {
      localStorage.removeItem(MYWEEK_KEY);
      renderMyWeekPicker();
    });
  }

  function renderMyWeekPicker() {
    const sorted = [...staffList].sort((a, b) => a.name.localeCompare(b.name));
    const options = sorted.map(s => `<option value="${s.name}">${s.name}${s.type === "anaesthetist" ? " (Anaesthetist)" : ""}</option>`).join("");
    document.getElementById("myweekCard").innerHTML = `
      <div class="myweek-select-row">
        <select id="myweekSelect">
          <option value="">Select your name…</option>
          ${options}
        </select>
      </div>
    `;
    document.getElementById("myweekSelect").addEventListener("change", (e) => {
      if (!e.target.value) return;
      localStorage.setItem(MYWEEK_KEY, e.target.value);
      renderMyWeekResult(e.target.value);
    });
  }

  function initMyWeek() {
    const saved = localStorage.getItem(MYWEEK_KEY);
    if (saved && staffList.some(s => s.name === saved)) {
      renderMyWeek
